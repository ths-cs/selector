<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation Order Selector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            overflow: hidden;
        }

        .name-display {
            font-size: clamp(3rem, 12vw, 8rem);
            line-height: 1.1;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            text-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        }

        .sidebar-list {
            scrollbar-width: thin;
            scrollbar-color: #334155 #0f172a;
        }

        .sidebar-list::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-list::-webkit-scrollbar-thumb {
            background-color: #334155;
            border-radius: 10px;
        }

        .active-glow {
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .hotkey-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .key-box {
            background: #334155;
            color: white;
            padding: 1px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-weight: bold;
        }

        #copy-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 8px 24px;
            border-radius: 99px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen w-screen p-4 md:p-8 gap-6">

    <!-- Main Display Area -->
    <main class="flex-grow flex flex-col items-center justify-center relative bg-slate-900/50 rounded-3xl border border-slate-800 shadow-2xl order-2 md:order-1">
        
        <div class="absolute top-8 left-8 flex items-center gap-2">
            <div id="status-indicator" class="h-3 w-3 bg-indigo-500 rounded-full active-glow"></div>
            <span id="header-label" class="text-xs font-bold uppercase tracking-widest text-slate-500">Currently Presenting</span>
        </div>

        <!-- Big Name Display -->
        <div id="current-name" class="name-display text-center px-6 transition-all duration-300">
            START
        </div>

        <!-- Status Action Buttons -->
        <div id="status-actions" class="flex gap-4 mt-8 opacity-0 pointer-events-none transition-opacity">
            <button onclick="setStatus('presented')" class="flex flex-col items-center gap-1 group">
                <div class="w-12 h-12 rounded-full bg-emerald-500/10 border border-emerald-500/50 flex items-center justify-center group-hover:bg-emerald-500 group-hover:text-white text-emerald-500 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                </div>
                <span class="text-[10px] font-bold text-emerald-500 uppercase">Present</span>
            </button>
            
            <button onclick="setStatus('skipped')" class="flex flex-col items-center gap-1 group">
                <div class="w-12 h-12 rounded-full bg-amber-500/10 border border-amber-500/50 flex items-center justify-center group-hover:bg-amber-500 group-hover:text-white text-amber-500 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 17 5-5-5-5"/><path d="m13 17 5-5-5-5"/></svg>
                </div>
                <span class="text-[10px] font-bold text-amber-500 uppercase">Skip</span>
            </button>

            <button onclick="setStatus('absent')" class="flex flex-col items-center gap-1 group">
                <div class="w-12 h-12 rounded-full bg-rose-500/10 border border-rose-500/50 flex items-center justify-center group-hover:bg-rose-500 group-hover:text-white text-rose-500 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </div>
                <span class="text-[10px] font-bold text-rose-500 uppercase">Absent</span>
            </button>
        </div>

        <!-- Navigation Controls / Footer -->
        <div class="absolute bottom-12 flex flex-col items-center gap-6">
            
            <!-- Hotkey Legend -->
            <div class="flex flex-wrap justify-center gap-3 max-w-md px-4">
                <div class="hotkey-pill"><span class="key-box">P</span> Present</div>
                <div class="hotkey-pill"><span class="key-box">S</span> Skip</div>
                <div class="hotkey-pill"><span class="key-box">A</span> Absent</div>
                <div class="hotkey-pill"><span class="key-box">→</span> Next</div>
                <div class="hotkey-pill"><span class="key-box">←</span> Prev</div>
            </div>

            <div class="flex gap-4">
                <button onclick="exportList()" class="px-6 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-[10px] font-bold rounded-lg border border-slate-700 uppercase tracking-widest transition-all">
                    Copy Export List (With Timestamps)
                </button>
                <button onclick="resetOrder()" class="px-6 py-2 text-[10px] text-slate-600 hover:text-indigo-400 uppercase tracking-widest font-bold transition-colors">
                    Reset & Reshuffle
                </button>
            </div>
        </div>
    </main>

    <!-- Sidebar Queue -->
    <aside class="w-full md:w-80 flex flex-col bg-slate-900/80 rounded-3xl border border-slate-800 p-6 order-1 md:order-2 max-h-[35vh] md:max-h-full">
        <h2 class="text-sm font-black uppercase tracking-tighter text-indigo-400 mb-4 flex justify-between items-center">
            Queue 
            <span id="progress-text" class="text-slate-500 text-[10px]">0 / 29</span>
        </h2>
        
        <div id="queue-list" class="sidebar-list flex-grow overflow-y-auto grid grid-cols-2 sm:grid-cols-3 md:grid-cols-1 gap-2 pr-2">
            <!-- List items injected here -->
        </div>
    </aside>

    <div id="copy-toast">Export Copied to Clipboard!</div>

    <script>
        const studentNames = [
"GENESIS",
"SANTANA",
"AYDAN",
"DESTINY",
"KATELYN",
"JAVIER",
"ESMERALDA",
"VICTORIA",
"JACQUELINE",
"GIA",
"DAVID",
"IZABELL",
"DENISE",
"TAILYNN",
"JONATHAN",
"LANDEN",
"SAMARA",
"JOSE",
"DAMIAN",
"RAIDEN",
"EMANUEL AGUSTIN",
"YELIT",
"JULIUS",
"EVELYN",
"JONATHAN",
"XADRIAN",
"ALEXA",
"DARIUS",
"ANGEL"

        ];

        let shuffledData = [];
        let currentIndex = -1;

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array.map(name => ({ 
                name, 
                status: 'pending',
                timestamp: null 
            }));
        }

        function setStatus(status) {
            if (currentIndex >= 0 && currentIndex < shuffledData.length) {
                shuffledData[currentIndex].status = status;
                shuffledData[currentIndex].timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                updateDisplay();
            }
        }

        function updateDisplay() {
            const display = document.getElementById('current-name');
            const queueList = document.getElementById('queue-list');
            const progress = document.getElementById('progress-text');
            const statusActions = document.getElementById('status-actions');
            const indicator = document.getElementById('status-indicator');
            const headerLabel = document.getElementById('header-label');

            if (currentIndex === -1) {
                display.innerText = "READY?";
                display.className = "name-display text-center px-6 text-slate-700";
                statusActions.classList.add('opacity-0', 'pointer-events-none');
                headerLabel.innerText = "Presentation Start";
            } else if (currentIndex >= shuffledData.length) {
                display.innerText = "FINISH";
                display.className = "name-display text-center px-6 text-emerald-500";
                statusActions.classList.add('opacity-0', 'pointer-events-none');
                headerLabel.innerText = "All Done";
            } else {
                const current = shuffledData[currentIndex];
                display.innerText = current.name;
                statusActions.classList.remove('opacity-0', 'pointer-events-none');
                headerLabel.innerText = "Currently Presenting";

                if (current.status === 'presented') {
                    display.className = "name-display text-center px-6 text-emerald-400";
                    indicator.className = "h-3 w-3 bg-emerald-500 rounded-full active-glow";
                } else if (current.status === 'absent') {
                    display.className = "name-display text-center px-6 text-rose-500 line-through opacity-50";
                    indicator.className = "h-3 w-3 bg-rose-500 rounded-full";
                } else if (current.status === 'skipped') {
                    display.className = "name-display text-center px-6 text-amber-500 italic opacity-80";
                    indicator.className = "h-3 w-3 bg-amber-500 rounded-full active-glow";
                } else {
                    display.className = "name-display text-center px-6 text-white";
                    indicator.className = "h-3 w-3 bg-indigo-500 rounded-full active-glow";
                }
            }

            queueList.innerHTML = '';
            shuffledData.forEach((student, index) => {
                const div = document.createElement('div');
                const isPast = index < currentIndex;
                const isCurrent = index === currentIndex;
                
                let statusIcon = '';
                let bgClass = 'bg-slate-800 border-slate-700 text-slate-300';
                
                if (student.status === 'presented') {
                    statusIcon = '✓';
                    bgClass = 'bg-emerald-900/20 border-emerald-500/30 text-emerald-400';
                } else if (student.status === 'absent') {
                    statusIcon = '✕';
                    bgClass = 'bg-rose-900/20 border-rose-500/30 text-rose-400 line-through opacity-60';
                } else if (student.status === 'skipped') {
                    statusIcon = '»';
                    bgClass = 'bg-amber-900/20 border-amber-500/30 text-amber-400';
                } else if (isCurrent) {
                    bgClass = 'bg-indigo-600 border-indigo-400 text-white scale-105 shadow-lg z-10';
                } else if (isPast) {
                    bgClass = 'bg-slate-800/30 border-transparent text-slate-600';
                }
                
                div.className = `p-2 px-3 rounded-lg text-xs font-bold transition-all border flex justify-between items-center ${bgClass}`;
                div.innerHTML = `
                    <div class="flex flex-col">
                        <span><span class="opacity-40 mr-1">${index + 1}</span> ${student.name}</span>
                        ${student.timestamp ? `<span class="text-[8px] opacity-50 mt-1">${student.timestamp}</span>` : ''}
                    </div>
                    <span class="font-black">${statusIcon}</span>
                `;
                queueList.appendChild(div);
            });

            progress.innerText = `${Math.max(0, currentIndex + 1)} / ${shuffledData.length}`;
        }

        function nextPresenter() {
            if (currentIndex < shuffledData.length) {
                currentIndex++;
                updateDisplay();
                const currentEl = document.querySelector('.bg-indigo-600');
                if (currentEl) currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function prevPresenter() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
            }
        }

        function exportList() {
            const date = new Date().toLocaleDateString();
            let text = `Presentation Session: ${date}\n--------------------------------\n`;
            
            shuffledData.forEach((s, i) => {
                const status = s.status === 'pending' ? 'Not reached' : s.status.toUpperCase();
                const time = s.timestamp ? ` at ${s.timestamp}` : '';
                text += `${i+1}. ${s.name.padEnd(20)} | Status: ${status}${time}\n`;
            });

            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);

            const toast = document.getElementById('copy-toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        function resetOrder() {
            shuffledData = shuffle([...studentNames]);
            currentIndex = -1;
            updateDisplay();
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'arrowright' || key === 'enter' || key === ' ') {
                nextPresenter();
            } else if (key === 'arrowleft') {
                prevPresenter();
            } else if (key === 'c' || key === 'p') {
                setStatus('presented');
            } else if (key === 's') {
                setStatus('skipped');
            } else if (key === 'a' || key === 'x') {
                setStatus('absent');
            }
        });

        resetOrder();
    </script>
</body>
</html>
